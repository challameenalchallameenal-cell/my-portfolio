<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Vasantha Kumar</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .contact-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .contact-method {
            margin: 25px 0;
            padding: 20px;
            background: rgba(56, 189, 248, 0.05);
            border-radius: 15px;
            transition: transform 0.3s ease;
        }

        .contact-method:hover {
            transform: translateY(-5px);
            background: rgba(56, 189, 248, 0.1);
        }

        .contact-label {
            color: #38bdf8;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 8px;
        }

        .contact-link {
            color: #f8fafc;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .contact-link:hover {
            text-decoration: underline;
        }

        .back-home {
            margin-top: 20px;
            display: inline-block;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <div class="contact-card">
            <h1>Get In Touch</h1>
            <p style="color: #94a3b8;">I'm open to new opportunities and collaborations.</p>

            <div class="contact-method">
                <span class="contact-label">Phone</span>
                <a href="tel:+916380844791" class="contact-link">+91 63808 44791</a>
            </div>

            <div class="contact-method">
                <span class="contact-label">Email</span>
                <a href="mailto:vasnthakumar@gmail.com" class="contact-link">vasnthakumar@gmail.com</a>
            </div>

            <a href="index.html" class="back-home">← Back to Portfolio</a>
        </div>
    </div>

</body>
</html>
